<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PicarX · Config</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>

<div class="card">
  <h2>Configuration</h2>
  <div class="hint" id="cfg-note">loading…</div>
  <div id="env-warn"></div>
  <div class="row" style="margin-top:10px">
    <button class="primary" onclick="saveConfig()">Save changes</button>
    <button onclick="loadConfig()">Revert</button>
    <span id="cfg-status"></span>
  </div>
</div>

<div id="cfg-body"></div>

<script src="/app.js"></script>
<script>
let KNOBS = [];   // [{section,key,type,value,default,desc,env,env_override}, ...]

function fieldId(k) { return `cfg-${k.section}-${k.key}`; }

function inputFor(k) {
  const id = fieldId(k), v = k.value;
  if (k.type === 'bool')
    return `<input type="checkbox" id="${id}" data-type="bool" ${v ? 'checked' : ''}>`;
  if (k.type === 'int' || k.type === 'float')
    return `<input type="number" step="${k.type === 'int' ? '1' : 'any'}" id="${id}" data-type="${k.type}" value="${v}">`;
  return `<input type="text" id="${id}" data-type="str" value="${PX.esc(String(v == null ? '' : v))}">`;
}

function knobRow(k) {
  const def = k.type === 'str' ? `"${k.default}"` : String(k.default);
  let help = k.desc ? PX.esc(k.desc) + ' ' : '';
  help += `<span style="opacity:.7">(default: ${PX.esc(def)})</span>`;
  let warn = '';
  if (k.env_override != null) {
    warn = `<div class="khelp" style="color:var(--off)">⚠ Overridden by environment
      variable <b>${PX.esc(k.env)}=${PX.esc(k.env_override)}</b> — this wins at runtime,
      so your saved value won't take effect until that variable is unset.</div>`;
  } else if (k.env) {
    help += ` <span style="opacity:.55">· env: ${PX.esc(k.env)}</span>`;
  }
  return `<div class="knob"><span class="kname">${PX.esc(k.key)}</span>${inputFor(k)}
      <div class="khelp">${help}</div>${warn}</div>`;
}

function renderEnvBanner() {
  const shadowed = KNOBS.filter(k => k.env_override != null);
  const el = document.getElementById('env-warn');
  if (!shadowed.length) { el.innerHTML = ''; return; }
  const names = shadowed.map(k => k.env).join(', ');
  el.innerHTML = `<div class="hint" style="color:var(--off);margin-top:8px">
    ⚠ ${shadowed.length} setting(s) are currently overridden by environment
    variables and won't change here until those are unset: <b>${PX.esc(names)}</b>.</div>`;
}

async function loadConfig() {
  const body = document.getElementById('cfg-body');
  try {
    const d = await PX.get('/config/data');
    document.getElementById('cfg-note').textContent = d.note || '';
    KNOBS = d.knobs || [];
    renderEnvBanner();
    const bySection = {};
    for (const k of KNOBS) (bySection[k.section] = bySection[k.section] || []).push(k);
    body.innerHTML = Object.keys(bySection).map(sec =>
      `<div class="card cfg-sec"><h3>${PX.esc(sec)}</h3>` +
      bySection[sec].map(knobRow).join('') + `</div>`).join('');
    document.getElementById('cfg-status').textContent = '';
  } catch (e) {
    body.innerHTML = '<div class="card hint">could not load config</div>';
  }
}

function readField(k) {
  const el = document.getElementById(fieldId(k));
  if (k.type === 'bool') return el.checked;
  if (k.type === 'int') { const n = parseInt(el.value, 10); return isNaN(n) ? k.value : n; }
  if (k.type === 'float') { const n = parseFloat(el.value); return isNaN(n) ? k.value : n; }
  return el.value;
}

async function saveConfig() {
  const edits = {};
  for (const k of KNOBS) {
    const val = readField(k);
    if (val !== k.value) (edits[k.section] = edits[k.section] || {})[k.key] = val;
  }
  const status = document.getElementById('cfg-status');
  if (!Object.keys(edits).length) { status.textContent = 'no changes'; return; }
  status.textContent = 'saving…';
  const r = await PX.post('/config/save', {config: edits});
  if (r && r.ok) { status.textContent = 'saved ✓'; loadConfig(); }
  else { status.textContent = (r && r.error) ? 'error: ' + r.error : 'save failed'; }
}

PX.startPolling(2000);
loadConfig();
</script>
</body>
</html>
